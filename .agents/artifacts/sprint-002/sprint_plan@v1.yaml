sprint_goal: >
  Domain layer: Entities + Repository protocols + UseCases for every domain in
  docs/api-reference.md, direct translation of that file's section headers (no new discovery
  needed). ForumRepository is explicitly OUT of scope — pinned to Sprint 14 per
  product_backlog.yaml's confirmed scope decision (feature-flagged off in the source app). No
  RepositoryImpl, no networking, no swift-dependencies wiring in this sprint — that begins in
  Sprint 3. Domain must never import networking, Firebase, or Ably (CLAUDE.md).

backlog:
  - id: F-005
    title: Entities
    description: >
      Plain Swift structs (Domain/Entities/, one file per entity) for every value type a
      Repository protocol method in this sprint needs to accept or return.
    acceptance_criteria:
      - Every entity is a plain `struct` (or `enum` for closed value sets) — zero imports beyond
        Foundation; no networking/Firebase/Ably/UIKit types anywhere in Domain/Entities/.
      - Entities conform to `Equatable` (and `Sendable` where they'll cross concurrency
        boundaries) but carry no DTO/JSON-coding-key concerns — that mapping is Data layer's job
        in Sprint 3, not Domain's.
      - Field names/shapes are derived directly from the request/response shapes documented in
        docs/api-reference.md for each endpoint — no invented fields.

  - id: F-006
    title: Repository protocols
    description: >
      One protocol per domain header in docs/api-reference.md: AuthRepository,
      BiometricRepository, UserRepository, AddressRepository, NotificationRepository,
      StreamRepository, StudioRepository, GameRepository, StoreRepository, OrderRepository,
      PaymentRepository, ReviewRepository, ChatRepository, MediaRepository,
      StaticContentRepository, LocationRepository. (ForumRepository excluded — see sprint_goal.)
    acceptance_criteria:
      - Each protocol lives in Domain/Repositories/, one file per protocol, method-per-endpoint
        matching docs/api-reference.md's tables 1:1 (path/verb/params implied by the method
        signature, not hardcoded strings — those live in Data layer, Sprint 3).
      - Protocol methods are `async throws`, take/return only Domain entities (from F-005) or
        Swift primitives — never a DTO, `Data`, `URLRequest`, or any Core/Data type.
      - No protocol has a concrete conformance yet in this sprint (that's RepositoryImpl, Sprint
        3) and no `DependencyKey` is created for any Repository protocol yet — creating one now
        would be premature since there's no `liveValue` implementation to wire until Sprint 3.
      - Live-only realtime paths (Firebase RTDB for viewer counts/live chat/reactions/bid
        leaderboard, Ably for chat delivery) are NOT modeled as Repository protocol methods here —
        StreamRepository/ChatRepository in this sprint cover only their REST-backed methods from
        docs/api-reference.md; the realtime data-source abstractions are built alongside the
        features that need them (Sprint 9/10 per docs/architecture.md roadmap), not speculatively
        now.

  - id: F-007
    title: UseCases
    description: >
      One UseCase per Repository protocol method (thin wrapper composing exactly one Repository
      call each) — no invented business logic beyond what a single call already does.
    acceptance_criteria:
      - Each UseCase is a plain `struct` in Domain/UseCases/ taking its Repository protocol as a
        constructor parameter (`init(repository: SomeRepository)`) — NOT `@Dependency` directly
        inside the UseCase. Reason: no `DependencyKey` exists for any Repository protocol until
        Sprint 3, so a UseCase reaching for `@Dependency(\.someRepository)` today would not
        compile. Constructor injection keeps Domain fully self-contained and testable now;
        wiring UseCases to the live DI graph is deferred to whichever sprint builds the
        ViewModels that consume them (Sprint 4+).
      - Every UseCase has at least one unit test using a hand-written fake conforming to the
        Repository protocol (fakes live in studiopTests/, never shipped in the app target).
      - No UseCase silently combines multiple Repository calls into new orchestration logic not
        already implied by a single documented endpoint — that kind of composition is deferred
        until a real screen (Presentation layer, later sprints) demonstrates the need, to avoid
        guessing flows that don't exist yet.

