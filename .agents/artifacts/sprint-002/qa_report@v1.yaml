  Test verification: re-ran `xcodebuild test -scheme studiop -destination 'platform=iOS
  Simulator,name=iPhone 16'` independently of dev_report's claim — 136/136 tests pass, 0
  failures (Sprint 1's 20 tests + Sprint 2's ~116 new UseCase tests), confirming
  `unit_tests_passed: true` was accurate after the fix below.

  One real bug caught and fixed during this QA pass (not present in the final dev_report state,
  documented here for traceability): the Commerce group's `Category` entity collided with
  Objective-C runtime's own `Category` type once Swift Testing's toolchain pulled in
  `objc/runtime.h` inside `StoreUseCaseTests.swift` — compiled fine in the app target, failed
  only in the test target ("'Category' is ambiguous for type lookup"). Renamed to
  `ProductCategory` across its 5 referencing files; rebuild + retest both green. This is the same
  class of bug as Sprint 1's `Environment`/`@Environment` collision — worth a standing habit of
  checking new Domain entity names against common Foundation/ObjC-reserved words before naming
  them (`Environment`, `Category`, `Notification` are all already claimed — this sprint correctly
  avoided bare `Notification` in favor of `NotificationItem`).

  Carried-over item, not a release blocker for this sprint (Domain layer has no opinion on
  backend response shape until Sprint 3's DTOs exist), flagged for whoever picks up Sprint 3: the
  Commerce group's `StoreSettings` entity covers both the filter/homepage-zone shapes and the
  store-front detail shape (`GET /stores/detail`) since no dedicated `Store` entity was scoped in
  the sprint plan — confirm with the user whether a distinct entity is wanted before Sprint 3
  builds its DTO/RepositoryImpl.
