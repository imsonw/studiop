project_name: Studiop
description: >
  iOS/Swift rebuild of an existing Flutter live-commerce app, reusing its backend API as-is.
  Clean Architecture: Presentation -> Domain (Entity/UseCase/Repository protocol) -> Data
  (RepositoryImpl/DataSource) -> Core (NetworkClient/Environment). Domain never imports
  networking, Firebase, or Ably. DI via swift-dependencies. Scope decisions confirmed with the
  user on 2026-07-14: v1 live streaming is viewer/bidding side only (streamer/broadcast side
  deferred to a later sprint); Forum and Marketplace are included in this backlog but pinned to
  the end as low-priority, since they are off by feature flag in the source app.

  Data-layer build-out is just-in-time, not batched (confirmed with the user on 2026-07-15):
  after Sprint 2 built Domain (Entities/Repository protocols/UseCases) for all 16 domains at
  once, Sprint 3 was deliberately narrowed to RepositoryImpl for only Auth + User — just enough
  for Sprint 4's vertical slice to validate the RepositoryImpl/DTO-mapping pattern against the
  real backend once, before committing to it across the other 14 domains. Reason: docs/api-
  reference.md was reverse-engineered from the Flutter client, not confirmed with the backend
  team — if Sprint 4 surfaces a systemic mapping issue, only 2 domains need rework instead of 16.
  Every later feature sprint is expected to include its own "build RepositoryImpl +
  DependencyKey for domain X" DEV tasks immediately before that sprint's Presentation/UI work,
  for whichever Repository protocols that sprint's features need and Data layer doesn't cover
  yet — do not assume Data layer is already done for a domain just because Domain (protocols)
  exists for it. `Data/` mirrors `Domain/`'s per-feature folder layout (`Data/Auth/`,
  `Data/Commerce/`, ...), confirmed 2026-07-15 — see docs/architecture.md.

  Sprint 5 scope narrowed on 2026-07-15 (confirmed with the user), same reasoning as the Sprint 3
  narrowing above: the original Sprint 5 backlog entry bundled 6 features (F-011 through F-016)
  with very uneven Data-layer readiness. Verified against the actual codebase: AuthRepositoryImpl
  already implements every AuthRepository method (register, login, verifyAccount, resetPassword,
  confirmResetPassword, loginWithSocial) from Sprint 3, so F-011 and F-013 need zero new Data
  layer work — Presentation only, same narrow-slice-first shape as Sprint 4. F-012 (Biometric)
  has no Data layer at all yet (no BiometricRepositoryImpl). F-014's address book sub-feature
  needs a new AddressRepositoryImpl (UserRepositoryImpl only covers changeUserAddress on the
  User's own record, not the separate AddressRepository CRUD protocol). F-016 (feature-flag
  toggle screen) depends on Firebase Remote Config feature-flag infrastructure that doesn't exist
  until the former Sprint 12 (Cross-cutting hardening). Resolution: Sprint 5 is now F-011 + F-013
  only; F-012/F-014/F-015 moved into a new Sprint 6; F-016 moved into the former Sprint 12
  (renumbered Sprint 13) alongside F-045 (Feature flags), which it depends on. Every sprint
  formerly numbered 6-14 is renumbered +1 (now 7-15) to make room.

  Sprint 6 planned 2026-07-16. Verified against the codebase: Domain (entities, `BiometricRepository`/
  `AddressRepository` protocols, all four UseCases each) already exists for both from Sprint 2, but
  neither has a Data-layer impl yet — same "just-in-time Data layer" build-out as every prior sprint.
  `UserRepositoryImpl` already implements `requestAccountRemoval`/`confirmAccountRemoval` (Sprint 3),
  so F-015's account-deletion half needs zero new Data layer, same shape as F-011/F-013 in Sprint 5.
  Two scope items narrowed rather than guessed:
  (1) F-015 originally bundled "Account deletion & verification" — docs/features.md lists "Account
  verification flow (separate from email verification at registration)" but docs/api-reference.md
  has no endpoint for it beyond `/users/verify/account` (registration's email-verify, already built
  in Sprint 5). Same treatment as "Quick login" in Sprint 5: excluded from Sprint 6, needs
  clarification (likely against the Flutter source) before it can be planned — Sprint 6's F-015 is
  account deletion only.
  (2) F-012 Biometric: `/v1/biometric/enable`'s documented request body is `{device_id, device_name}`
  — no `biometric_token` field, and its response shape isn't documented at all, so where
  `biometric_token` originates (server-issued vs. device-generated secret) is unconfirmed. Sprint 6's
  DEV task flags this explicitly rather than guessing; must verify against the Flutter source or real
  captured traffic before finalizing `BiometricRepositoryImpl`. Also new this sprint: Face ID/Touch ID
  itself (the device prompt, via `LocalAuthentication`/`LAContext`) has no Core-layer wrapper yet —
  distinct from `BiometricRepository` (which only talks to the backend pairing endpoints) — needs its
  own small Core abstraction + `DependencyKey`, same DI convention as `KeychainStoring`.

  Backlog reshaped 2026-07-16 around a second, explicit goal alongside feature-parity: this project
  is also the user's vehicle to level up to Senior iOS, since recent day-to-day work (last ~4 years)
  has been predominantly Flutter/cross-platform. Full gap analysis and reasoning in
  docs/senior-skills-roadmap.md — summary of what changed structurally in this file:
  (1) Sprint 6/F-014 gains a MapKit location-picker on the address create/edit form (approved
  scope-add beyond docs/features.md's bare "list/create/update/delete", justified by the `Address.
  location` field that already exists) — see sprint-006's own sprint_plan for the concrete task.
  (2) Sprint 8/F-023 (Order history) gains a deliberate SwiftData-backed offline cache — resolves
  architecture.md's "SwiftData vs. simpler cache, decide per-feature" open decision for this one
  feature specifically, chosen for hands-on SwiftData depth (not a blanket persistence rewrite).
  (3) Sprint 7 and Sprint 10 each gain a senior-technique addition that doesn't need a new F-id
  (implementation technique, not a user-facing feature) — see docs/senior-skills-roadmap.md §1-2,7.
  (4) Sprint 13 gains three new features (F-053 SSL Pinning, F-054 Crashlytics, F-055 CI/CD &
  Fastlane) alongside its existing cross-cutting hardening scope.
  (5) A new Sprint 14 "Testing & Quality Hardening" (F-056) is inserted right after Sprint 13 —
  deliberately placed before the already-deferred/low-priority RTMP-streaming and Community
  sprints rather than after them, so it doesn't risk trailing behind sprints that may not ship soon.
  The former Sprint 14 (RTMP streaming) is renumbered Sprint 15; the former Sprint 15 (Community) is
  renumbered Sprint 16. The scrum skill's "no unit tests" Testing Policy is otherwise unchanged for
  every other sprint — this is a deliberately separate, purposeful testing pass (Domain UseCases +
  1-2 complex ViewModels), not a reversal of that decision.

sprints:
  - sprint: 1
    goal: >
      Stand up the Core layer (NetworkClient, Environment, Keychain token store,
      swift-dependencies) so every later Repository has a foundation to build on.
    status: completed
    features:
      - id: F-001
        title: NetworkClient protocol + URLSession implementation
        description: >
          Token as query param (?token=), lang header, device_fw query param, 401/403 ->
          clear session. See docs/api-reference.md -> Auth mechanism.
      - id: F-002
        title: Environment config
        description: >
          Single source of truth for staging/prod API base URL and Firebase RTDB URL,
          re-resolvable after a Firebase Remote Config fetch. See docs/api-reference.md ->
          Base configuration.
      - id: F-003
        title: Keychain token store
        description: Persist the auth token in Keychain; lightweight cache for the user profile.
      - id: F-004
        title: swift-dependencies integration
        description: Add the swift-dependencies SPM package as the project's only DI mechanism.

  - sprint: 2
    goal: >
      Domain layer: Entities + Repository protocols for every domain in api-reference.md.
      Direct translation of that file's section headers, no new discovery needed.
    status: completed
    features:
      - id: F-005
        title: Entities
        description: >
          Plain Swift structs for User, Address, Notification, LiveStream, Studio, Product,
          Cart, Order, Payment, Review, Chat/Conversation, Game (Blackjack/LuckyWheel), and
          related value types.
      - id: F-006
        title: Repository protocols
        description: >
          One protocol per domain: AuthRepository, BiometricRepository, UserRepository,
          AddressRepository, NotificationRepository, StreamRepository, StudioRepository,
          GameRepository, StoreRepository, OrderRepository, PaymentRepository,
          ReviewRepository, ChatRepository, MediaRepository, StaticContentRepository,
          LocationRepository.
      - id: F-007
        title: UseCases
        description: One UseCase per user-facing action, composing Repository protocol calls.

  - sprint: 3
    goal: >
      Data layer (REST only) for Auth + User ONLY — narrowed from the original "all 16 domains"
      scope on 2026-07-15 to reduce rework risk (see top-level description). RepositoryImpl +
      DTO<->Entity mapping + DependencyKey for AuthRepository and UserRepository, wired to
      Core's NetworkClient, just enough for Sprint 4's vertical slice. The other 14 domains'
      Data layer (Biometric, Address, Notification, Stream, Studio, Game, Store, Order, Payment,
      Review, Chat, Media, StaticContent, Location) is deferred to whichever later sprint
      builds the feature that needs it.
    status: completed
    features:
      - id: F-008
        title: REST RepositoryImpls (Auth + User only)
        description: >
          DTO<->Entity mapping and RepositoryImpl for AuthRepository and UserRepository only.
          The other 14 domains listed in the original F-008 description are deferred — see
          top-level description's just-in-time Data-layer decision.
      - id: F-009
        title: DependencyKeys (Auth + User only)
        description: >
          One swift-dependencies DependencyKey + DependencyValues extension per repository
          protocol from F-008, wiring liveValue to its RepositoryImpl.

  - sprint: 4
    goal: >
      Vertical slice: wire Auth end-to-end (login -> Keychain -> /users/info -> empty Home)
      to prove all four layers talk to each other before building out features.
    status: completed
    features:
      - id: F-010
        title: Login vertical slice
        description: >
          Login screen -> AuthRepository.login -> token to Keychain -> UserRepository.info ->
          navigate to an empty Home shell. Proves the Presentation/Domain/Data/Core boundary
          end-to-end.

  - sprint: 5
    goal: >
      Remaining Auth flows that need zero new Data layer work — narrowed on 2026-07-15 (see
      top-level description) to just Registration/quick-login/email-verification/password-reset
      and Social login, since AuthRepositoryImpl already implements every method both need.
      Presentation-only, same shape as Sprint 4.
    status: completed
    features:
      - id: F-011
        title: Registration, quick login, email verification, password reset
        description: Full auth flows per docs/features.md -> Auth & Account.
      - id: F-013
        title: Social login
        description: >
          Google, Apple, TikTok, plus the post-social "collect email" screen when the
          provider doesn't supply one.

  - sprint: 6
    goal: >
      Remaining Auth & Account feature set, deferred from Sprint 5 on 2026-07-15 because each
      needs new Data layer work first: Biometric login (no BiometricRepositoryImpl exists yet),
      Profile & address book (address book CRUD needs a new AddressRepositoryImpl —
      UserRepositoryImpl's changeUserAddress only covers the user's own record, not the separate
      AddressRepository protocol), and Account deletion & verification.
    status: completed
    features:
      - id: F-012
        title: Biometric login
        description: >
          Face ID/Touch ID, device_id + biometric_token pairing, enable/disable/check-status,
          per docs/api-reference.md -> BiometricRepository. Needs a new BiometricRepositoryImpl
          + DependencyKey before the Presentation work.
      - id: F-014
        title: Profile & address book
        description: >
          View/edit profile, change password, change info (Presentation only — UserRepositoryImpl
          already covers these), address book (list/create/update/delete/set default,
          select-address bottom sheet — needs a new AddressRepositoryImpl + DependencyKey first).
      - id: F-015
        title: Account deletion & verification
        description: Request-with-reason + email-code confirm; separate account verification flow.

  - sprint: 7
    goal: >
      Store/Catalog + Cart/Checkout — highest business value, least technical risk. Senior-skill
      addition (2026-07-16, docs/senior-skills-roadmap.md §1,7 — no new F-id, an implementation
      technique within F-017/F-018, not a user-facing feature): product image loading implemented
      twice for comparison — a DispatchSemaphore-gated GCD version and the TaskGroup/actor version
      that actually ships — plus an Instruments (Leaks/Allocations/Time Profiler) checkpoint at the
      end of this sprint, the first of two (the other is Sprint 10).
    status: completed
    features:
      - id: F-017
        title: Storefront & catalog browse
        description: Storefront tab, category browse, product list per category, brand listing.
      - id: F-018
        title: Product detail
        description: Image carousel, seller card, tiered pricing, reviews, related products.
      - id: F-019
        title: Search
        description: Autocomplete, recent searches, suggested products.
      - id: F-020
        title: Favorites & flash sale
        description: Favorite/followed shops, flash sale list, "today's suggestion" section.
      - id: F-021
        title: Cart
        description: Add/update/remove/clear/count, tiered-price add-to-cart bottom sheet.
      - id: F-022
        title: Checkout
        description: >
          Address selection, payment method, order creation, success screen, "buy now"
          (checkout without adding to cart first).

  - sprint: 8
    goal: Orders, Payment, and Reviews.
    status: pending
    features:
      - id: F-023
        title: Order list & detail
        description: >
          Status filter/search, shipping/payment/voucher/invoice cards, status banner,
          invoice PDF viewer, voucher code redemption. Senior-skill addition (2026-07-16,
          docs/senior-skills-roadmap.md §3, confirmed with the user): backed by a deliberate
          SwiftData local cache so already-placed orders stay visible offline — resolves
          architecture.md's "SwiftData vs. simpler cache, decide per-feature" open decision for
          this feature specifically (`@Model`, `ModelContainer`/`ModelContext`, background-context
          inserts/fetches). Other features keep whatever simpler cache they already use; this is
          not a blanket persistence rewrite.
      - id: F-024
        title: Mollie payment
        description: In-app WebView payment, redirect back into order detail on completion.
      - id: F-025
        title: Reviews
        description: >
          Write review (star rating, photo/video upload, per line-item), view reviews
          (product + store/shop stats), "my reviews" not-yet-reviewed/reviewed tabs.

  - sprint: 9
    goal: >
      Home/Dashboard and the bottom tab shell, composed from the Store/Order building blocks
      already built. Carries over two known-incomplete source-app screens as mock-data-only
      per docs/features.md — do not silently "complete" them with an invented backend.
    status: pending
    features:
      - id: F-026
        title: Home tab
        description: >
          Statistics strip, home banners/slides, quote/review block, live-stream list +
          category filter, hot products section (mock data only, no real endpoint — carry
          the limitation over), lucky-wheel studio carousel, quick actions, per-platform
          filter section.
      - id: F-027
        title: Welcome/onboarding screen
        description: First-run onboarding flow.
      - id: F-028
        title: Bottom tab shell
        description: Home / Live / Store / Forum (flag-gated) / Order / Account.
      - id: F-029
        title: News detail screen
        description: >
          Single detail screen backed by mock data only, per docs/features.md — no real
          endpoint exists; do not invent one.

  - sprint: 10
    goal: >
      Live viewing & bidding — viewer side only per confirmed v1 scope (2026-07-14). Includes
      the Firebase RTDB data sources this feature needs (not built speculatively earlier).
      Senior-skill addition (2026-07-16, docs/senior-skills-roadmap.md §2,7 — no new F-id): this is
      the only sprint with genuine concurrent writers (RTDB pushing chat/reactions/bids into shared
      UI state from callbacks not guaranteed to land on the main thread) — deliberately reproduce a
      real data race here once before fixing it with `actor`/`@MainActor`, rather than only ever
      seeing the already-fixed version. Second (of two) Instruments checkpoint at sprint end,
      alongside video-playback memory profiling.
    status: pending
    features:
      - id: F-030
        title: Live list + filter
        description: By category/platform, per docs/api-reference.md StreamRepository + StudioRepository.
      - id: F-031
        title: Live room playback
        description: >
          Multi-CDN video playback, one player per source (native RTMP, TikTok, Twitch,
          YouTube, Castr).
      - id: F-032
        title: Firebase RTDB data sources
        description: >
          studio_live_rooms, live_rooms_by_studio, studio_messages (+ legacy fallback paths),
          studio_live_log, studio_active_viewers, live_stream_top_bid (read-only),
          live_reactions, live_errors. Firebase anonymous auth for RTDB security rules only —
          not tied to app login.
      - id: F-033
        title: Live chat
        description: Firebase-backed for in-app streams, REST-polling fallback for web/social streams.
      - id: F-034
        title: Reactions overlay
        description: Heart/flower, via live_reactions RTDB path.
      - id: F-035
        title: Bid list overlay + leaderboard
        description: Read-only, computed server-side via live_stream_top_bid.
      - id: F-036
        title: '"Now selling" overlay'
        description: >
          Branch on studio_live_log (Firebase, in-app) vs REST stream/log polling (web/social)
          per docs/api-reference.md selection rule — mirror both branches.
      - id: F-037
        title: Pre-live modal
        description: '"Coming soon" countdown, shop stats, media gallery, CTA button.'

  - sprint: 11
    goal: Chat & Notifications.
    status: pending
    features:
      - id: F-038
        title: Support/order chat
        description: >
          Ably-backed (token from REST /chat/broadcasting/auth): conversation list, thread
          view, image/video/document attachments, order-context card, connection-status
          indicator, read/active-state sync.
      - id: F-039
        title: Push notifications
        description: >
          FCM topic-based (public/per-platform/per-user), tap-through to detail, in-app
          notification list.

  - sprint: 12
    goal: Mini-games.
    status: pending
    features:
      - id: F-040
        title: Lucky Wheel
        description: Per-studio spin wheel, prize modal, intro/product-detail modals tied to prizes.
      - id: F-041
        title: Blackjack
        description: >
          Full card game, stats + score recording. Keep its entry point disabled in Home to
          mirror the source app (built, not exposed) unless the user says otherwise.

  - sprint: 13
    goal: >
      Cross-cutting hardening across all features built so far. Also picks up F-016
      (feature-flag toggle screen, moved from the original Sprint 5 on 2026-07-15) since it
      depends on this sprint's F-045 Feature-flag infrastructure. Gains three security/observability/
      DevOps features 2026-07-16 (docs/senior-skills-roadmap.md §4-6) — F-053/F-054/F-055 below.
    status: pending
    features:
      - id: F-042
        title: Coordinator navigation
        description: Per-feature Coordinator/Router replacing ad-hoc NavigationStack usage.
      - id: F-043
        title: Localization
        description: 11 locales, matching the source app's language coverage.
      - id: F-044
        title: Theming
        description: Design tokens/colors/typography consistent across features.
      - id: F-045
        title: Feature flags
        description: >
          Mirror the Flutter FeatureFlag enum (forum, marketplace) via Firebase Remote
          Config, consumed through Environment.
      - id: F-016
        title: Feature-flag toggle screen
        description: >
          Dev/QA-only tool for flipping Forum/Marketplace flags. Depends on F-045 above —
          moved here from the original Sprint 5 on 2026-07-15 since that infrastructure didn't
          exist yet at that point in the roadmap.
      - id: F-046
        title: Forced app-update banner
        description: >
          app_update_enabled_*, app_update_min_version_name_*, app_update_store_url_* from
          Firebase Remote Config.
      - id: F-053
        title: SSL Pinning
        description: >
          Certificate/public-key pinning on URLSessionNetworkClient via URLSessionDelegate.
          Added 2026-07-16 (docs/senior-skills-roadmap.md §4) — hardens the NetworkClient built
          in Sprint 1 once the app is feature-complete-ish, not a green-field requirement.
      - id: F-054
        title: Crashlytics
        description: >
          Firebase Crashlytics integration — dSYM upload, symbolication, uncaught-exception/
          signal handlers. Added 2026-07-16 (docs/senior-skills-roadmap.md §5); Firebase already
          enters the project in Sprint 10 (RTDB).
      - id: F-055
        title: CI/CD & Fastlane
        description: >
          Fastlane lane (build -> archive -> TestFlight) + CI config (GitHub Actions) running
          static analysis on every push. Added 2026-07-16 (docs/senior-skills-roadmap.md §6).

  - sprint: 14
    goal: >
      Testing & Quality Hardening — new sprint inserted 2026-07-16
      (docs/senior-skills-roadmap.md §8), placed here rather than at the literal end of the
      roadmap so it lands before the already-deferred/low-priority RTMP-streaming and Community
      sprints, not after them. Does not reverse the scrum skill's "no unit tests" Testing Policy
      for any other sprint — this is a deliberately separate, purposeful pass: Domain UseCases
      (pure logic, cheapest to test, highest signal) and 1-2 of the more complex ViewModels
      (Sprint 10's concurrent-write handling is a strong candidate) — not blanket coverage of
      every screen.
    status: pending
    features:
      - id: F-056
        title: Purposeful test suite for core Domain/ViewModel layers
        description: >
          XCTest coverage for select high-value, high-risk logic only — not every screen. Exists
          so the portfolio project has a real testing story to speak to (the CV lists "XCTest,
          70%+ coverage" as an existing skill), without slowing down every feature sprint that
          preceded this one.

  - sprint: 15
    goal: >
      Streaming (seller/broadcaster side) — deferred out of v1 per the RTMP scope decision
      confirmed with the user on 2026-07-14. Low priority; revisit after Sprint 14 ships.
      (Renumbered from Sprint 14 on 2026-07-16 to make room for the new Testing & Quality
      Hardening sprint above.)
    status: pending
    features:
      - id: F-047
        title: RTMP broadcast start/stop
        description: Camera broadcast start/stop.
      - id: F-048
        title: Selling controls mid-stream
        description: Toggle "selling" on/off, attach a product to sell, mid-stream.
      - id: F-049
        title: Stream resume
        description: Resume an in-progress stream on a new device, or one started on web.
      - id: F-050
        title: Broadcast reliability
        description: >
          Network-instability detection, streamer-side bidder list, confirm-stop-live/
          confirm-stop-selling/confirm-web-session modals, image upload for stream/product.

  - sprint: 16
    goal: >
      Community layer (Forum, Marketplace) — pinned last per the user's decision on
      2026-07-14: included in the backlog but low priority, since both are off by feature
      flag in the source app. Confirm final go/no-go with stakeholders before starting.
      (Renumbered from Sprint 15 on 2026-07-16 to make room for the new Testing & Quality
      Hardening sprint.)
    status: pending
    features:
      - id: F-051
        title: Forum
        description: >
          Category feed, post detail + threaded comments, create post (topic/subtopic),
          reactions, user's own forum profile (posts/comments/media tabs).
      - id: F-052
        title: Marketplace
        description: >
          Location-based classifieds: category/for-you/local tabs, multi-step listing
          creation, deal/offer negotiation, message-seller, user's own listings + saved items.
